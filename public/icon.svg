  <!-- Occhi bianchi -->
  <rect x="144" y="216" width="96" height="80" fill="#FFFFFF"/>
  <rect x="272" y="216" width="96" height="80" fill="#FFFFFF"/>

  <!-- Dollari (S a 5×7 + asta verticale, pixel da 8 unità) -->
